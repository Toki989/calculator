<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-border: #000000;
      --display-bg: #ffffff;
      --display-border: #000000;
      --text: #000000;
      --muted: #111111;
      --digit-bg: #ffffff;
      --digit-hover: #f1f1f1;
      --operator-bg: #ffffff;
      --operator-hover: #f1f1f1;
      --equals-bg: #000000;
      --equals-hover: #1a1a1a;
      --equals-text: #ffffff;
      --clear-bg: #ffffff;
      --clear-hover: #f1f1f1;
      --history-bg: #ffffff;
      --history-border: #000000;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    .calculator {
      width: min(360px, calc(100vw - 24px));
      background: var(--panel);
      border: 2px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 16px 36px var(--shadow);
      padding: 14px;
    }

    .display {
      background: var(--display-bg);
      border: 2px solid var(--display-border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .formula {
      min-height: 1.3em;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: right;
      overflow-wrap: anywhere;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .result {
      min-height: 1.5em;
      margin-top: 6px;
      font-size: 2rem;
      font-weight: 700;
      text-align: right;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1.5px solid #000000;
      border-radius: 10px;
      min-height: 52px;
      padding: 0.55rem 0.4rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.06s ease, background-color 0.15s ease, color 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .digit {
      background: var(--digit-bg);
    }

    .digit:hover {
      background: var(--digit-hover);
    }

    .operator {
      background: var(--operator-bg);
    }

    .operator:hover {
      background: var(--operator-hover);
    }

    .equals {
      background: var(--equals-bg);
      color: var(--equals-text);
    }

    .equals:hover {
      background: var(--equals-hover);
    }

    .clear {
      background: var(--clear-bg);
    }

    .clear:hover {
      background: var(--clear-hover);
    }

    .span-2 {
      grid-column: span 2;
    }

    .history {
      margin-top: 12px;
      background: var(--history-bg);
      border: 2px solid var(--history-border);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 220px;
    }

    .history h2 {
      margin: 0 0 8px;
      font-size: 0.9rem;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      min-height: 138px;
      max-height: 160px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
    }

    .history-list li {
      padding: 6px 8px;
      border-radius: 8px;
      background: #ffffff;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .hint {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="電卓">
    <section class="display" aria-live="polite">
      <div id="formula" class="formula"></div>
      <div id="display" class="result">0</div>
    </section>

    <section class="keypad" aria-label="キー">
      <button class="clear span-2" onclick="clearAll()">C</button>
      <button class="operator" onclick="handleOperator('/')">÷</button>
      <button class="operator" onclick="handleOperator('*')">×</button>

      <button class="digit" onclick="handleNumber('7')">7</button>
      <button class="digit" onclick="handleNumber('8')">8</button>
      <button class="digit" onclick="handleNumber('9')">9</button>
      <button class="operator" onclick="handleOperator('-')">－</button>

      <button class="digit" onclick="handleNumber('4')">4</button>
      <button class="digit" onclick="handleNumber('5')">5</button>
      <button class="digit" onclick="handleNumber('6')">6</button>
      <button class="operator" onclick="handleOperator('+')">＋</button>

      <button class="digit" onclick="handleNumber('1')">1</button>
      <button class="digit" onclick="handleNumber('2')">2</button>
      <button class="digit" onclick="handleNumber('3')">3</button>
      <button class="equals" onclick="calculate()">＝</button>

      <button class="digit span-2" onclick="handleNumber('0')">0</button>
      <button class="digit" onclick="handleNumber('.')">.</button>
      <button class="clear" onclick="clearAll()">AC</button>
    </section>

    <section class="history" aria-label="計算履歴">
      <h2>計算履歴</h2>
      <ul id="historyList" class="history-list"></ul>
      <div class="hint">Spaceキーで履歴を削除</div>
    </section>
  </main>

  <script>
    const MAX_HISTORY_ITEMS = 10;
    const DISPLAY_FONT_MAX = 32;
    const DISPLAY_FONT_MIN = 16;
    const FORMULA_FONT_MAX = 16;
    const FORMULA_FONT_MIN = 12;
    const HISTORY_FONT_MAX = 14;
    const HISTORY_FONT_MIN = 11;

    let firstNumber = '';
    let operator = '';
    let isNewInput = true;
    let currentInput = '0';
    let history = [];

    const display = document.getElementById('display');
    const formula = document.getElementById('formula');
    const historyList = document.getElementById('historyList');

    function fitTextToWidth(element, minSize, maxSize) {
      let size = maxSize;
      element.style.fontSize = `${size}px`;
      while (size > minSize && element.scrollWidth > element.clientWidth) {
        size -= 1;
        element.style.fontSize = `${size}px`;
      }
      element.style.overflowX = element.scrollWidth > element.clientWidth ? 'auto' : 'hidden';
    }

    function resetTextFit(element, baseSize) {
      element.style.fontSize = `${baseSize}px`;
      element.style.overflowX = 'hidden';
    }

    function formatOperatorSymbol(value) {
      if (value === '*') return '×';
      if (value === '/') return '÷';
      if (value === '+') return '＋';
      return '－';
    }

    function formatNumberWithCommas(value) {
      if (value === 'エラー' || value === '') {
        return value;
      }

      const text = String(value);
      const [integerPart, fractionPart] = text.split('.');
      const negative = integerPart.startsWith('-');
      const digits = negative ? integerPart.slice(1) : integerPart;
      const formattedInteger = digits.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      const head = negative ? `-${formattedInteger}` : formattedInteger;
      return fractionPart !== undefined ? `${head}.${fractionPart}` : head;
    }

    function isErrorState() {
      return currentInput === 'エラー';
    }

    function resetAfterError() {
      firstNumber = '';
      operator = '';
      isNewInput = true;
      currentInput = 'エラー';
    }

    function render() {
      display.textContent = formatNumberWithCommas(currentInput);
      formula.textContent = firstNumber !== '' && operator
        ? `${formatNumberWithCommas(firstNumber)} ${formatOperatorSymbol(operator)} ${isNewInput ? '' : formatNumberWithCommas(currentInput)}`
        : firstNumber !== ''
          ? `${formatNumberWithCommas(firstNumber)} ${formatOperatorSymbol(operator)}`
          : '';

      historyList.innerHTML = '';
      history.slice(0, MAX_HISTORY_ITEMS).forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        historyList.appendChild(li);
      });

      resetTextFit(display, DISPLAY_FONT_MAX);
      resetTextFit(formula, FORMULA_FONT_MAX);
      fitTextToWidth(display, DISPLAY_FONT_MIN, DISPLAY_FONT_MAX);
      fitTextToWidth(formula, FORMULA_FONT_MIN, FORMULA_FONT_MAX);

      historyList.querySelectorAll('li').forEach((item) => {
        resetTextFit(item, HISTORY_FONT_MAX);
        fitTextToWidth(item, HISTORY_FONT_MIN, HISTORY_FONT_MAX);
      });
    }

    function normalizeResult(value) {
      if (!Number.isFinite(value)) {
        return 'エラー';
      }
      if (Number.isInteger(value)) {
        return String(value);
      }
      const text = String(value);
      return text.includes('.') ? text.replace(/0+$/, '').replace(/\.$/, '') : text;
    }

    function handleNumber(value) {
      if (isErrorState()) {
        clearAll();
      }

      if (isNewInput) {
        currentInput = value === '.' ? '0.' : value;
        isNewInput = false;
      } else {
        if (value === '.' && currentInput.includes('.')) {
          return;
        }
        if (currentInput === '0' && value !== '.') {
          currentInput = value;
        } else {
          currentInput += value;
        }
      }

      render();
    }

    function handleOperator(nextOperator) {
      if (isErrorState()) {
        clearAll();
        return;
      }

      if (firstNumber !== '' && operator && !isNewInput) {
        calculate();
      }

      firstNumber = currentInput;
      operator = nextOperator;
      isNewInput = true;
      render();
    }

    function calculate() {
      if (!firstNumber || !operator) {
        return;
      }

      const left = parseFloat(firstNumber);
      const right = parseFloat(currentInput);
      let result = 0;

      if (operator === '+') {
        result = left + right;
      } else if (operator === '-') {
        result = left - right;
      } else if (operator === '*') {
        result = left * right;
      } else if (operator === '/') {
        if (right === 0) {
          resetAfterError();
          render();
          return;
        }
        result = left / right;
      }

      const leftText = formatNumberWithCommas(firstNumber);
      const rightText = formatNumberWithCommas(currentInput);
      currentInput = normalizeResult(result);
      const resultText = formatNumberWithCommas(currentInput);
      history.unshift(`${leftText} ${formatOperatorSymbol(operator)} ${rightText} = ${resultText}`);
      history = history.slice(0, MAX_HISTORY_ITEMS);
      firstNumber = '';
      operator = '';
      isNewInput = true;
      render();
    }

    function clearAll() {
      firstNumber = '';
      operator = '';
      isNewInput = true;
      currentInput = '0';
      render();
    }

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        history = [];
        render();
      }
    });

    window.addEventListener('resize', render);

    render();
  </script>
</body>
</html>
