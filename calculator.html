<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --bg: #d8d8d8;
      --panel: #efefef;
      --panel-border: #111111;
      --display-bg: #f8f8f8;
      --display-border: #111111;
      --text: #101010;
      --muted: #5f5f5f;
      --digit-bg: #c9c9c9;
      --digit-hover: #bbbbbb;
      --operator-bg: #f7f7f7;
      --operator-hover: #e2e2e2;
      --equals-bg: #111111;
      --equals-hover: #2b2b2b;
      --equals-text: #ffffff;
      --clear-bg: #b2b2b2;
      --clear-hover: #9f9f9f;
      --history-bg: #f8f8f8;
      --history-border: #111111;
      --shadow: rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eaeaea 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    .calculator {
      width: min(360px, calc(100vw - 24px));
      background: var(--panel);
      border: 2px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 16px 36px var(--shadow);
      padding: 14px;
    }

    .display {
      background: var(--display-bg);
      border: 2px solid var(--display-border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .formula {
      min-height: 1.3em;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: right;
      overflow-wrap: anywhere;
      white-space: nowrap;
      overflow: hidden;
    }

    .result {
      min-height: 1.5em;
      margin-top: 6px;
      font-size: 2rem;
      font-weight: 700;
      text-align: right;
      overflow: hidden;
      white-space: nowrap;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1.5px solid #111111;
      border-radius: 10px;
      min-height: 52px;
      padding: 0.55rem 0.4rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.06s ease, background-color 0.15s ease, color 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .digit {
      background: var(--digit-bg);
    }

    .digit:hover {
      background: var(--digit-hover);
    }

    .operator {
      background: var(--operator-bg);
    }

    .operator:hover {
      background: var(--operator-hover);
    }

    .equals {
      background: var(--equals-bg);
      color: var(--equals-text);
    }

    .equals:hover {
      background: var(--equals-hover);
    }

    .clear {
      background: var(--clear-bg);
    }

    .clear:hover {
      background: var(--clear-hover);
    }

    .span-2 {
      grid-column: span 2;
    }

    .history {
      margin-top: 12px;
      background: var(--history-bg);
      border: 2px solid var(--history-border);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 220px;
    }

    .history h2 {
      margin: 0 0 8px;
      font-size: 0.9rem;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      min-height: 138px;
      max-height: 138px;
      overflow: hidden;
    }

    .history-list li {
      padding: 6px 8px;
      border-radius: 8px;
      background: #ededed;
      white-space: nowrap;
      overflow: hidden;
    }

    .hint {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="電卓">
    <section class="display" aria-live="polite">
      <div id="formula" class="formula"></div>
      <div id="display" class="result">0</div>
    </section>

    <section class="keypad" aria-label="キー">
      <button class="clear span-2" onclick="clearAll()">C</button>
      <button class="operator" onclick="handleOperator('/')">÷</button>
      <button class="operator" onclick="handleOperator('*')">×</button>

      <button class="digit" onclick="handleNumber('7')">7</button>
      <button class="digit" onclick="handleNumber('8')">8</button>
      <button class="digit" onclick="handleNumber('9')">9</button>
      <button class="operator" onclick="handleOperator('-')">－</button>

      <button class="digit" onclick="handleNumber('4')">4</button>
      <button class="digit" onclick="handleNumber('5')">5</button>
      <button class="digit" onclick="handleNumber('6')">6</button>
      <button class="operator" onclick="handleOperator('+')">＋</button>

      <button class="digit" onclick="handleNumber('1')">1</button>
      <button class="digit" onclick="handleNumber('2')">2</button>
      <button class="digit" onclick="handleNumber('3')">3</button>
      <button class="equals" onclick="calculate()">＝</button>

      <button class="digit span-2" onclick="handleNumber('0')">0</button>
      <button class="digit" onclick="handleNumber('.')">.</button>
      <button class="clear" onclick="clearAll()">AC</button>
    </section>

    <section class="history" aria-label="計算履歴">
      <h2>計算履歴</h2>
      <ul id="historyList" class="history-list"></ul>
      <div class="hint">Spaceキーで履歴を削除</div>
    </section>
  </main>

  <script>
    let firstNumber = '';
    let operator = '';
    let isNewInput = true;
    let currentInput = '0';
    let history = [];

    const display = document.getElementById('display');
    const formula = document.getElementById('formula');
    const historyList = document.getElementById('historyList');

    function fitTextToWidth(element, minSize, maxSize) {
      let size = maxSize;
      element.style.fontSize = `${size}px`;
      while (size > minSize && element.scrollWidth > element.clientWidth) {
        size -= 1;
        element.style.fontSize = `${size}px`;
      }
    }

    function render() {
      display.textContent = currentInput;
      formula.textContent = firstNumber !== '' && operator
        ? `${firstNumber} ${operator} ${isNewInput ? '' : currentInput}`
        : firstNumber !== ''
          ? `${firstNumber} ${operator}`
          : '';

      historyList.innerHTML = '';
      history.slice(0, 10).forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        historyList.appendChild(li);
      });

      fitTextToWidth(display, 16, 32);
      fitTextToWidth(formula, 12, 16);
      historyList.querySelectorAll('li').forEach((item) => {
        fitTextToWidth(item, 11, 14);
      });
    }

    function normalizeResult(value) {
      if (!Number.isFinite(value)) {
        return 'エラー';
      }
      if (Number.isInteger(value)) {
        return String(value);
      }
      const text = String(value);
      return text.includes('.') ? text.replace(/0+$/, '').replace(/\.$/, '') : text;
    }

    function handleNumber(value) {
      if (currentInput === 'エラー') {
        clearAll();
      }

      if (isNewInput) {
        currentInput = value === '.' ? '0.' : value;
        isNewInput = false;
      } else {
        if (value === '.' && currentInput.includes('.')) {
          return;
        }
        if (currentInput === '0' && value !== '.') {
          currentInput = value;
        } else {
          currentInput += value;
        }
      }

      render();
    }

    function handleOperator(nextOperator) {
      if (currentInput === 'エラー') {
        clearAll();
        return;
      }

      if (firstNumber !== '' && operator && !isNewInput) {
        calculate();
      }

      firstNumber = currentInput;
      operator = nextOperator;
      isNewInput = true;
      render();
    }

    function calculate() {
      if (!firstNumber || !operator) {
        return;
      }

      const left = parseFloat(firstNumber);
      const right = parseFloat(currentInput);
      let result = 0;

      if (operator === '+') {
        result = left + right;
      } else if (operator === '-') {
        result = left - right;
      } else if (operator === '*') {
        result = left * right;
      } else if (operator === '/') {
        if (right === 0) {
          firstNumber = '';
          operator = '';
          currentInput = 'エラー';
          isNewInput = true;
          render();
          return;
        }
        result = left / right;
      }

      const symbol = operator === '*' ? '×' : operator === '/' ? '÷' : operator === '+' ? '＋' : '－';
      const expression = `${firstNumber} ${symbol} ${currentInput}`;
      currentInput = normalizeResult(result);
      history.unshift(`${expression} = ${currentInput}`);
      history = history.slice(0, 10);
      firstNumber = '';
      operator = '';
      isNewInput = true;
      render();
    }

    function clearAll() {
      firstNumber = '';
      operator = '';
      isNewInput = true;
      currentInput = '0';
      render();
    }

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        history = [];
        render();
      }
    });

    window.addEventListener('resize', render);

    render();
  </script>
</body>
</html>
